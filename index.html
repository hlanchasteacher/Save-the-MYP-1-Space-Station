<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Mission: Save the MYP-1 Space Station</title>
    <style>
        :root {
            --bg-deep: #0a0e17; --bg-panel: #111827; --accent-cyan: #00e5ff; --accent-purple: #b388ff;
            --accent-green: #69f0ae; --accent-orange: #ffab40; --accent-pink: #ff80ab; --accent-red: #ff5252;
            --accent-yellow: #ffd740; --text-primary: #e0e0e0; --text-bright: #ffffff; --text-muted: #b0b0b0;
            --border-glow: #1e3a5f; --font-main: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            --radius-lg: 20px; --radius-md: 14px; --radius-sm: 10px; --shadow-card: 0 8px 32px rgba(0,0,0,0.4);
            --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-main); background: var(--bg-deep); color: var(--text-primary); min-height: 100vh; font-size: 1.1rem; line-height: 1.6; }
        .stars-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .star { position: absolute; border-radius: 50%; background: #fff; animation: twinkle var(--dur) ease-in-out infinite; animation-delay: var(--delay); opacity: 0; }
        @keyframes twinkle { 0%,100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 0.9; transform: scale(2); } }
        .app-wrapper { position: relative; z-index: 1; max-width: 950px; margin: 0 auto; padding: 20px 16px 40px; }
        .header { text-align: center; padding: 24px 20px 16px; }
        .header .logo-emoji { font-size: 3.5rem; display: block; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }
        .header h1 { font-size: 1.8rem; font-weight: 800; color: var(--text-bright); text-shadow: 0 0 40px rgba(0,229,255,0.4); }
        .card { background: var(--bg-panel); border: 1px solid var(--border-glow); border-radius: var(--radius-lg); padding: 24px 20px; margin: 14px 0; box-shadow: var(--shadow-card); }
        .card h2 { font-size: 1.35rem; color: var(--text-bright); margin-bottom: 10px; }
        .card h3 { font-size: 1.15rem; color: var(--accent-cyan); margin: 14px 0 6px; }
        .btn { display: inline-block; padding: 12px 26px; font-size: 1.05rem; font-weight: 700; border-radius: 50px; border: none; cursor: pointer; transition: var(--transition-smooth); font-family: var(--font-main); color: #000; }
        .btn-primary { background: var(--accent-cyan); box-shadow: 0 4px 20px rgba(0,229,255,0.35); }
        .btn-primary:hover { background: #4dffee; transform: translateY(-2px); }
        .btn-success { background: var(--accent-green); }
        .btn-outline { background: transparent; border: 2px solid var(--accent-cyan); color: var(--accent-cyan); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
        .phase-badge { display: inline-block; padding: 5px 14px; border-radius: 50px; font-weight: 700; font-size: 0.8rem; }
        .badge-ct { background: rgba(0,229,255,0.2); color: var(--accent-cyan); border: 1px solid var(--accent-cyan); }
        .badge-myp { background: rgba(179,136,255,0.2); color: var(--accent-purple); border: 1px solid var(--accent-purple); }
        .badge-bridge { background: rgba(255,215,64,0.2); color: var(--accent-yellow); border: 1px solid var(--accent-yellow); }
        .discovery-box { background: linear-gradient(135deg, #1a1040, #0d1b2a); border: 2px solid var(--accent-purple); border-radius: var(--radius-md); padding: 18px; margin: 14px 0; }
        .draggable-item { background: #1e2638; border: 1px solid #3a4458; border-radius: var(--radius-sm); padding: 8px 12px; margin: 5px 0; cursor: grab; font-size: 0.9rem; user-select: none; }
        .draggable-item.placed { background: #1a2e1a; border-color: var(--accent-green); cursor: default; }
        .draggable-item.wrong-placement { background: #2e1a1a; border-color: var(--accent-red); animation: shake 0.5s ease; }
        @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
        .panel-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin: 10px 0; }
        .panel-option { background: #1a1f2e; border: 3px solid #2a3040; border-radius: var(--radius-md); padding: 12px; cursor: pointer; text-align: center; }
        .panel-option.selected { border-color: var(--accent-green); background: #152018; }
        .btn-vital { background: #ff5252; color: #fff; width: 20px; height: 20px; border-radius: 50%; display: inline-block; margin: 2px; font-size: 0.6rem; line-height: 20px; }
        .btn-useless { background: #555; color: #aaa; width: 20px; height: 20px; border-radius: 50%; display: inline-block; margin: 2px; font-size: 0.6rem; line-height: 20px; }
        .condition-tag { display: inline-block; padding: 8px 14px; border-radius: 50px; font-weight: 700; font-size: 0.9rem; cursor: grab; background: #1e2638; border: 2px solid #3a4458; margin: 4px; }
        .discovery-dropzone { min-height: 80px; border: 3px dashed var(--accent-orange); border-radius: var(--radius-md); padding: 12px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .matching-slot { min-height: 55px; border: 2px dashed #3a4458; border-radius: var(--radius-sm); padding: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
        .ct-tag { display: inline-block; padding: 6px 12px; border-radius: 50px; font-weight: 700; font-size: 0.85rem; cursor: grab; margin: 2px; max-width: 100%; word-break: break-word; }
        .ct-decomp { background: rgba(0,229,255,0.2); border: 2px solid var(--accent-cyan); color: var(--accent-cyan); }
        .ct-abstr { background: rgba(179,136,255,0.2); border: 2px solid var(--accent-purple); color: var(--accent-purple); }
        .ct-algo { background: rgba(255,171,64,0.2); border: 2px solid var(--accent-orange); color: var(--accent-orange); }
        .ct-pattern { background: rgba(255,128,171,0.2); border: 2px solid var(--accent-pink); color: var(--accent-pink); }
        .toast { position: fixed; top: 20px; right: 20px; background: #1a1f2e; border: 2px solid var(--accent-green); color: #fff; padding: 12px 20px; border-radius: var(--radius-sm); z-index: 999; font-weight: 700; animation: slideIn 0.4s ease, fadeOut 0.5s ease 2.5s forwards; }
        @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }
        .step-border { border: 2px solid #3a4458; border-radius: var(--radius-sm); padding: 8px 12px; margin: 4px 0; transition: border-color 0.3s; cursor: grab; }
        .step-correct { border-color: var(--accent-green) !important; box-shadow: 0 0 12px rgba(105,240,174,0.4); }
        .step-wrong { border-color: var(--accent-red) !important; }
        .sentence-card { background: #1a1f2e; border: 2px solid #2a3040; border-radius: var(--radius-md); padding: 14px; margin: 8px 0; cursor: pointer; transition: all 0.3s; }
        .selected-sentence { border-color: var(--accent-purple) !important; background: rgba(179,136,255,0.15); box-shadow: 0 0 16px rgba(179,136,255,0.3); }
        .slot-box { display: inline-block; width: 50px; height: 50px; border: 2px dashed #555; border-radius: 8px; margin: 0 4px; vertical-align: middle; text-align: center; line-height: 46px; font-size: 0.85rem; transition: all 0.3s; cursor: pointer; }
        .slot-filled { border-color: var(--accent-cyan); background: rgba(0,229,255,0.15); }
        .context-label { color: var(--accent-orange); font-weight: 700; margin-bottom: 4px; display: block; }
        @media (max-width: 600px) { .header h1 { font-size: 1.3rem; } .card { padding: 16px 12px; } }
    </style>
</head>
<body>
    <div class="stars-container" id="starsContainer" aria-hidden="true"></div>
    <div id="toastContainer"></div>
    <div class="app-wrapper">
        <div class="header"><span class="logo-emoji">🛰️</span><h1>Mission: Save the MYP-1 Space Station</h1><p class="subtitle">🚀 Engineering Emergency Protocol</p></div>
        <div id="screenContainer"></div>
    </div>
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            document.getElementById('screenContainer').innerHTML =
                '<div class="card" style="color:var(--accent-red)"><h2>⚠️ Script Error</h2><pre style="white-space:pre-wrap;word-break:break-word;">' +
                message + '\n\n' + (error && error.stack ? error.stack : '') +
                '</pre><p>Check console for details.</p></div>';
            console.error(error);
            return true;
        };

        (function() {
            const sc = document.getElementById('screenContainer');
            const tc = document.getElementById('toastContainer');
            for (let i = 0; i < 100; i++) {
                const s = document.createElement('div'); s.classList.add('star');
                const sz = Math.random() * 3 + 1;
                s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${Math.random()*3+2}s;--delay:${Math.random()*5}s`;
                document.getElementById('starsContainer').appendChild(s);
            }
            const SK = 'myp1_v9';
            let st = (() => {
                try { const r = localStorage.getItem(SK); return r ? JSON.parse(r) : null; }
                catch (e) { return null; }
            })() || {
                studentName: '', ct1: false, ct2: false, ct3: false, ct4: false,
                mypA: false, mypB: false, mypC: false, mypD: false, bridge: false,
                discCT: [], discMYP: [], bridgeAnswers: {}, startedAt: null, completedAt: null
            };
            function sv() { localStorage.setItem(SK, JSON.stringify(st)); }
            function rst() {
                st = { studentName: '', ct1: false, ct2: false, ct3: false, ct4: false, mypA: false, mypB: false, mypC: false, mypD: false, bridge: false, discCT: [], discMYP: [], bridgeAnswers: {}, startedAt: null, completedAt: null };
                sv();
            }
            function toast(m, t = 'success') {
                const el = document.createElement('div'); el.className = 'toast'; el.textContent = m;
                if (t === 'error') el.style.borderColor = 'var(--accent-red)';
                tc.appendChild(el); setTimeout(() => el.remove(), 3000);
            }
            function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
            function render(scr) {
                sc.innerHTML = '';
                switch (scr) {
                    case 'welcome': renderWelcome(); break;
                    case 'dash': renderDash(); break;
                    case 'ct1': renderCT1(); break;
                    case 'ct2': renderCT2(); break;
                    case 'ct3': renderCT3(); break;
                    case 'ct4': renderCT4(); break;
                    case 'mypA': renderMYPA(); break;
                    case 'mypB': renderMYPB(); break;
                    case 'mypC': renderMYPC(); break;
                    case 'mypD': renderMYPD(); break;
                    case 'bridge': renderBridge(); break;
                    case 'completion': renderCompletion(); break;
                    default: renderWelcome();
                }
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
            function goTo(id) {
                const m = { ct1:'ct1', ct2:'ct2', ct3:'ct3', ct4:'ct4', mypA:'mypA', mypB:'mypB', mypC:'mypC', mypD:'mypD', bridge:'bridge' };
                if (!m[id]) { render(id); return; }
                if (st[id]) { toast('⚠️ Already completed.', 'error'); render('dash'); return; }
                const order = ['ct1','ct2','ct3','ct4','mypA','mypB','mypC','mypD','bridge'];
                const idx = order.indexOf(id);
                if (idx > 0 && !st[order[idx-1]]) { toast('⚠️ Complete the previous phase first.', 'error'); render('dash'); return; }
                render(id);
            }
            window.goToPhase = goTo;

            // ---------- welcome & dashboard ----------
            function renderWelcome() {
                sc.innerHTML = `<div class="card" style="text-align:center;"><span style="font-size:4rem;">🛸</span><h2>Welcome, Engineer!</h2><p style="font-size:1.1rem;">The <strong>MYP-1 Space Station</strong> life support has failed.</p><p>Complete <strong>4 CT missions</strong>, <strong>4 MYP phases</strong>, and a <strong>Bridge Reflection</strong>.</p><p style="color:var(--accent-orange);">⚠️ Keep your notebook ready for your Toddle Exit Ticket!</p><div style="margin:18px 0;"><input type="text" id="ni" placeholder="Your name..." maxlength="60"></div><button class="btn btn-primary" id="bs" disabled>🚀 Begin Mission</button></div>`;
                const ni = document.getElementById('ni'), bs = document.getElementById('bs');
                if (st.studentName) { ni.value = st.studentName; bs.disabled = false; }
                ni.addEventListener('input', () => bs.disabled = ni.value.trim().length < 2);
                bs.addEventListener('click', () => {
                    const n = ni.value.trim();
                    if (n.length < 2) { toast('Enter your name.', 'error'); return; }
                    st.studentName = n; if (!st.startedAt) st.startedAt = new Date().toISOString();
                    sv(); render('dash');
                });
            }
            function renderDash() {
                const all = [ { id:'ct1', n:1, t:'Decomposition', c:st.ct1, u:true, em:'🔍', sec:'ct' }, { id:'ct2', n:2, t:'Abstraction', c:st.ct2, u:st.ct1, em:'🧹', sec:'ct' }, { id:'ct3', n:3, t:'Algorithm Design', c:st.ct3, u:st.ct2, em:'⚙️', sec:'ct' }, { id:'ct4', n:4, t:'Pattern Recognition', c:st.ct4, u:st.ct3, em:'📊', sec:'ct' }, { id:'mypA', n:5, t:'Inquiry & Analysis', c:st.mypA, u:st.ct4, em:'🔎', sec:'myp' }, { id:'mypB', n:6, t:'Developing Ideas', c:st.mypB, u:st.mypA, em:'💡', sec:'myp' }, { id:'mypC', n:7, t:'Creating the Solution', c:st.mypC, u:st.mypB, em:'🔧', sec:'myp' }, { id:'mypD', n:8, t:'Evaluation', c:st.mypD, u:st.mypC, em:'📝', sec:'myp' }, { id:'bridge', n:9, t:'The Bridge', c:st.bridge, u:st.mypD, em:'🌉', sec:'bridge' } ];
                const comp = all.filter(p=>p.c).length, pct = Math.round((comp/9)*100);
                sc.innerHTML = `<div class="card" style="text-align:center;"><p>👩‍🚀 Engineer <strong>${esc(st.studentName)}</strong></p><div style="width:100%;height:12px;background:#1e2638;border-radius:50px;margin:8px 0;"><div style="width:${pct}%;height:100%;background:linear-gradient(90deg,var(--accent-cyan),var(--accent-green));border-radius:50px;"></div></div><p>${comp}/9 (${pct}%)</p></div>${['🧠 CT','📋 MYP','🌉 Bridge'].map((t,i)=>`<p style="color:var(--accent-cyan);font-weight:700;">${t}</p>${all.filter(p=>p.sec===['ct','myp','bridge'][i]).map(p=>`<div class="card" style="cursor:${p.u&&!p.c?'pointer':'default'};" ${p.u&&!p.c?`onclick="window.goToPhase('${p.id}')"`:''}><h2>${p.c?'✅':'🟢'} ${p.em} Phase ${p.n}: ${p.t}</h2>${p.c?'<p style="color:var(--accent-green);">✔️ Completed</p>':(p.u?'<p style="color:var(--accent-cyan);">Click to start</p>':'')}</div>`).join('')}`).join('')}${st.bridge?`<div class="card" style="text-align:center;border-color:var(--accent-green);"><span style="font-size:3rem;">🏆</span><h2>Mission Accomplished!</h2><button class="btn btn-success" onclick="window.goToPhase('completion')">📋 Full Report</button></div>`:''}<button class="btn btn-outline btn-sm" id="brst">🔄 Restart</button>`;
                document.getElementById('brst').addEventListener('click', ()=>{ if(confirm('Restart?')){ rst(); render('welcome'); toast('Reset.'); } });
            }

            // ==================== CT1: DECOMPOSITION (two parts) ====================
            function renderCT1() {
                const problem = "The space station's life support is failing. Oxygen levels fluctuate, temperature varies wildly, the power grid is unstable, and the crew reports various health complaints.";
                const statements = [
                    { id:'s1', text:'Investigate oxygen recycler efficiency separately from temperature control.', valid:true },
                    { id:'s2', text:'Group crew health complaints by symptom type.', valid:true },
                    { id:'s3', text:'Analyse power consumption of each subsystem independently.', valid:true },
                    { id:'s4', text:'Check the cafeteria menu for crew preferences.', valid:false },
                    { id:'s5', text:'Separate the problem into air quality, thermal regulation, and power distribution.', valid:true },
                    { id:'s6', text:'Focus only on the captain\'s favourite control panel.', valid:false },
                    { id:'s7', text:'Break down the timeline of failures.', valid:true },
                    { id:'s8', text:'List all components in life support and test each one.', valid:true },
                    { id:'s9', text:'Investigate whether the issue is related to the recent solar storm.', valid:true },
                    { id:'s10', text:'Count the total number of blinking lights on the console.', valid:false },
                    { id:'s11', text:'Separate sensor data from crew subjective reports.', valid:true },
                    { id:'s12', text:'Check which astronaut has the nicest handwriting for the logbook.', valid:false }
                ];
                const shuf = [...statements].sort(()=>Math.random()-0.5);
                sc.innerHTML = `<div class="card"><span class="phase-badge badge-ct">CT Phase 1</span><h2>🔍 Decomposition</h2><p><span class="context-label">CONTEXT:</span> ${problem}</p><p>Select <strong>only the valid decomposition statements</strong> (ones that truly break the problem into smaller manageable parts).</p><p style="color:var(--accent-orange);">✏️ Copy the term <strong>Decomposition</strong> into your notebook.</p></div><div style="display:flex;flex-wrap:wrap;gap:6px;">${shuf.map(s=>'<div class="draggable-item" data-sid="'+s.id+'" style="cursor:pointer;">'+s.text+'</div>').join('')}</div><p id="selCount">0 selected</p><button class="btn btn-primary" id="bchk1">✅ Check Decomposition</button><p id="fb1"></p><div id="part2" style="display:none;"></div><div id="disc" style="display:none;"></div><button class="btn btn-outline btn-sm" onclick="window.goToPhase('dash')">↩️ Dashboard</button>`;
                let sel = [];
                document.querySelectorAll('[data-sid]').forEach(el => { el.addEventListener('click', function(){ const id = this.dataset.sid; if(sel.includes(id)){ sel = sel.filter(x=>x!==id); this.classList.remove('placed'); } else { sel.push(id); this.classList.add('placed'); } document.getElementById('selCount').textContent = sel.length + ' selected'; }); });
                document.getElementById('bchk1').addEventListener('click', ()=>{
                    const validIds = statements.filter(s=>s.valid).map(s=>s.id);
                    if(validIds.every(id=>sel.includes(id)) && sel.every(id=>validIds.includes(id))){
                        toast('✅ Correct! Now a second challenge.'); showPart2();
                    } else {
                        document.getElementById('fb1').style.color='var(--accent-red)'; document.getElementById('fb1').textContent='❌ Not quite. Remove irrelevant items and include all essential ones.';
                    }
                });
                function showPart2(){
                    document.getElementById('fb1').textContent = '';
                    document.getElementById('part2').style.display = 'block';
                    const complexTask = "The station's AI must diagnose a multi‑system failure. Three possible decomposition approaches are:";
                    const options = [
                        { id:'d1', text:'Option A: Break the problem into 100 tiny sub‑problems, one per sensor.', correct:false },
                        { id:'d2', text:'Option B: Divide into 3 logical groups: air, thermal, power, plus a timeline investigation.', correct:true },
                        { id:'d3', text:'Option C: Look at the whole system at once, without sub‑division.', correct:false }
                    ];
                    document.getElementById('part2').innerHTML = `<div class="card"><h3>Part 2: Choose the best decomposition</h3><p><span class="context-label">CONTEXT:</span> ${complexTask}</p>${options.map(o=>'<div class="draggable-item" data-did="'+o.id+'" style="cursor:pointer;">'+o.text+'</div>').join('')}<button class="btn btn-primary" id="bchk1b" disabled>✅ Check</button><p id="fb1b"></p></div>`;
                    let selD = null;
                    document.querySelectorAll('[data-did]').forEach(el => { el.addEventListener('click', function(){ document.querySelectorAll('[data-did]').forEach(e=>e.classList.remove('placed')); this.classList.add('placed'); selD = this.dataset.did; document.getElementById('bchk1b').disabled = false; }); });
                    document.getElementById('bchk1b').addEventListener('click', ()=>{
                        if(selD === 'd2'){ toast('✅ Best decomposition chosen!'); st.ct1 = true; if(!st.discCT.includes('Decomposition')) st.discCT.push('Decomposition'); sv(); showDisc1(); }
                        else { document.getElementById('fb1b').style.color='var(--accent-red)'; document.getElementById('fb1b').textContent = '❌ That approach is either too fragmented or ignores structure.'; }
                    });
                }
                function showDisc1(){ const d=document.getElementById('disc'); d.style.display='block'; d.innerHTML=`<div class="discovery-box"><span style="font-size:2.5rem;">💡</span><strong>Decomposition</strong><p>Breaking a big, complicated problem into smaller, easier‑to‑handle pieces. This helps you understand each part clearly before solving the whole thing.</p><p style="color:var(--accent-orange);">✏️ Copy this definition into your notebook.</p><div style="margin-top:10px;"><input type="checkbox" id="cb1"><label for="cb1">✅ I wrote it down.</label></div><button class="btn btn-success" id="bc1" disabled>➡️ Dashboard</button></div>`; document.getElementById('cb1').addEventListener('change',function(){ document.getElementById('bc1').disabled=!this.checked; }); document.getElementById('bc1').addEventListener('click',()=>goTo('dash')); }
            }

            // ==================== CT2: ABSTRACTION (bigger blueprints) ====================
            function renderCT2() {
                const ctrls = [{l:'Temperature Sensor',v:true},{l:'Pressure Valve',v:true},{l:'Fuel Flow Regulator',v:true},{l:'Ignition Spark',v:true},{l:'Disco Lights',v:false},{l:'Sweet Dispenser',v:false},{l:'Music Player',v:false},{l:'Coffee Machine',v:false},{l:'Selfie Camera',v:false},{l:'Party Mode',v:false},{l:'Star Map',v:false},{l:'Game Console',v:false}];
                const shuf = [...ctrls].sort(()=>Math.random()-0.5);
                const vLabels = ctrls.filter(c=>c.v).map(c=>c.l);
                const panels = [{id:'P1',n:'Panel Titan',btns:['Temperature Sensor','Pressure Valve','Fuel Flow Regulator','Ignition Spark'],ok:true},{id:'P2',n:'Panel Nova',btns:['Temperature Sensor','Pressure Valve','Fuel Flow Regulator','Disco Lights'],ok:false},{id:'P3',n:'Panel Eclipse',btns:['Temperature Sensor','Pressure Valve','Fuel Flow Regulator','Ignition Spark','Coffee Machine'],ok:false},{id:'P4',n:'Panel Aurora',btns:['Temperature Sensor','Pressure Valve','Music Player','Ignition Spark'],ok:false},{id:'P5',n:'Panel Storm',btns:['Temperature Sensor','Pressure Valve','Fuel Flow Regulator','Ignition Spark','Selfie Camera','Game Console'],ok:false},{id:'P6',n:'Panel Zenith',btns:['Temperature Sensor','Pressure Valve','Sweet Dispenser','Ignition Spark','Fuel Flow Regulator'],ok:false}];
                const blueprints = [
                    {id:'B1',n:'Blueprint Alpha',src:'Bluepring1.png',lvl:'too_detailed', caption:'Overloaded with every tiny component – hard to see the main structure.'},
                    {id:'B2',n:'Blueprint Beta',src:'Blueprint2.png',lvl:'correct', caption:'Clean and simple, showing only the 4 essential controls with clear connections.'},
                    {id:'B3',n:'Blueprint Gamma',src:'Blueprint3.png',lvl:'too_simple', caption:'Two unlabelled circles – too vague to be useful.'},
                    {id:'B4',n:'Blueprint Delta',src:'Blueprint4.png',lvl:'cluttered', caption:'Contains decorative borders and gradients that distract from the core controls.'},
                    {id:'B5',n:'Blueprint Epsilon',src:'Blueprint5.png',lvl:'cluttered', caption:'Includes two unnecessary controls (coffee, music) making it busier than needed.'}
                ];

                function showBrainstorming(){
                    document.getElementById('act2').style.display='block';
                    document.getElementById('act2').innerHTML = `<div class="card"><h3>Activity 2: Select most realistic brainstorming ideas</h3><p>${ideas.map(i=>'<div class="draggable-item" data-iid="'+i.id+'">'+i.text+'</div>').join('')}</div><p id="iFb">0 selected</p><button class="btn btn-primary" id="bchkB2">✅ Check</button><p id="fbB2"></p></div>`;
                    let selI=[]; document.querySelectorAll('[data-iid]').forEach(el=>{ el.addEventListener('click',function(){ const iid=this.dataset.iid; if(selI.includes(iid)){ selI=selI.filter(x=>x!==iid); this.classList.remove('placed'); } else { selI.push(iid); this.classList.add('placed'); } document.getElementById('iFb').textContent=selI.length+' selected'; }); });
                    document.getElementById('bchkB2').addEventListener('click',()=>{ const real=ideas.filter(i=>i.realistic).map(i=>i.id); if(real.every(i=>selI.includes(i))&&selI.every(i=>real.includes(i))){ toast('✅ Realistic!'); st.mypB=!0; if(!st.discMYP.includes('Criterion B')) st.discMYP.push('Criterion B'); sv(); showDiscB(); } else { document.getElementById('fbB2').style.color='var(--accent-red)'; document.getElementById('fbB2').textContent='Choose practical, achievable ideas.'; } });
                }
                function showDiscB(){ const d=document.getElementById('disc'); d.style.display='block'; d.innerHTML=`<div class="discovery-box"><span style="font-size:2.5rem;">💡</span><strong>Criterion B</strong><p>Generating different design ideas and evaluating them against criteria to pick the best one.</p><p style="color:var(--accent-orange);">✏️ Copy this definition.</p><div><input type="checkbox" id="cbB"><label>✅ I wrote it down.</label></div><button class="btn btn-success" id="bcB" disabled>➡️ Dashboard</button></div>`; document.getElementById('cbB').addEventListener('change',function(){ document.getElementById('bcB').disabled=!this.checked; }); document.getElementById('bcB').addEventListener('click',()=>goTo('dash')); }
            }

            function renderMYPC() {
                const plan = ['1. Shut down auxiliary power','2. Reroute cables','3. Replace damaged filter','4. Run diagnostic','5. Restore power'];
                const altPlan = ['1. Turn off main power','2. Bypass safety lock','3. Start the repair','4. Hope it works'];
                sc.innerHTML = `<div class="card"><span class="phase-badge badge-myp">MYP Phase C</span><h2>🔧 Creating the Solution</h2><p><span class="context-label">CONTEXT:</span> You are now building the solution, following your plan and documenting changes.</p><p style="color:var(--accent-orange);">✏️ Write <strong>Criterion C: Creating the Solution</strong>.</p></div><div id="actC1"><div class="card"><h3>Activity 1: A justified change</h3><p>Plan: ${plan.join(' → ')}</p><p><strong>Problem:</strong> During step 3, the spare filter is also damaged.</p><div>${['A) Skip it','B) Use older filter (works)','C) Stop for new filter','D) Ask crew manually'].map((c,i)=>'<label><input type="radio" name="ch" value="'+i+'"> '+c+'</label>').join('')}</div><button class="btn btn-primary" id="bchkC1">✅ Submit</button><p id="fbC1"></p></div></div><div id="actC2" style="display:none;"></div><div id="disc" style="display:none;"></div><button class="btn btn-outline btn-sm" onclick="window.goToPhase('dash')">↩️ Dashboard</button>`;
                document.getElementById('bchkC1').addEventListener('click',()=>{ const sel=document.querySelector('input[name="ch"]:checked'); if(!sel){ toast('Select an option.','error'); return; } if(sel.value==='1'){ toast('✅ Good, documented!'); showActC2(); } else { document.getElementById('fbC1').style.color='var(--accent-red)'; document.getElementById('fbC1').textContent='Think about keeping the project moving safely.'; } });
                function showActC2(){
                    document.getElementById('actC2').style.display='block';
                    document.getElementById('actC2').innerHTML=`<div class="card"><h3>Activity 2: Right or wrong plan?</h3><ol>${altPlan.map(s=>'<li>'+s+'</li>').join('')}</ol><button class="btn btn-primary" id="correctBtn">✅ It's correct</button> <button class="btn btn-outline" id="wrongBtn">❌ It's wrong</button><p id="fbC2"></p></div>`;
                    document.getElementById('correctBtn').addEventListener('click',()=>{ document.getElementById('fbC2').style.color='var(--accent-red)'; document.getElementById('fbC2').textContent='Incorrect – bypassing safety and hoping are dangerous.'; });
                    document.getElementById('wrongBtn').addEventListener('click',()=>{ toast('✅ Right! That plan is unsafe.'); st.mypC=!0; if(!st.discMYP.includes('Criterion C')) st.discMYP.push('Criterion C'); sv(); showDiscC(); });
                }
                function showDiscC(){ const d=document.getElementById('disc'); d.style.display='block'; d.innerHTML=`<div class="discovery-box"><span style="font-size:2.5rem;">💡</span><strong>Criterion C</strong><p>Following your plan, building, and recording any changes with justification.</p><p style="color:var(--accent-orange);">✏️ Copy this definition.</p><div><input type="checkbox" id="cbC"><label>✅ I wrote it down.</label></div><button class="btn btn-success" id="bcC" disabled>➡️ Dashboard</button></div>`; document.getElementById('cbC').addEventListener('change',function(){ document.getElementById('bcC').disabled=!this.checked; }); document.getElementById('bcC').addEventListener('click',()=>goTo('dash')); }
            }

            function renderMYPD() {
                const refs = [{id:'r1', text:'It worked perfectly, no more improvements needed.', correct:false},{id:'r2', text:'Oxygen and temperature are stable, but power inefficiency and one headache mean further optimisation and investigation are needed.', correct:true},{id:'r3', text:'Replace whole system because of one headache.', correct:false}];
                sc.innerHTML = `<div class="card"><span class="phase-badge badge-myp">MYP Phase D</span><h2>📝 Evaluation</h2><p><span class="context-label">CONTEXT:</span> One week after the repair, you collect test results and must reflect honestly.</p><p style="color:var(--accent-orange);">✏️ Write <strong>Criterion D: Evaluation</strong>.</p></div><div id="actD1"><div class="card"><h3>Activity 1: Select improvements</h3><p>Results: ✅ Oxygen 95% ✅ Temp stable ⚠️ Power +15% ❌ One crew headache</p><div>${['Optimise power','Investigate headache','Replace system again','Add decorations'].map((c,i)=>'<label><input type="radio" name="imp" value="'+i+'"> '+c+'</label>').join('')}</div><button class="btn btn-primary" id="bchkD1">✅ Submit</button></div></div><div id="actD2" style="display:none;"></div><div id="disc" style="display:none;"></div><button class="btn btn-outline btn-sm" onclick="window.goToPhase('dash')">↩️ Dashboard</button>`;
                document.getElementById('bchkD1').addEventListener('click',()=>{ const sel=document.querySelector('input[name="imp"]:checked'); if(!sel){ toast('Select an improvement.','error'); return; } if(sel.value==='0'||sel.value==='1'){ toast('✅ Honest evaluation!'); showActD2(); } else toast('Focus on real issues.','error'); });
                function showActD2(){
                    document.getElementById('actD2').style.display='block';
                    document.getElementById('actD2').innerHTML=`<div class="card"><h3>Activity 2: Choose the best reflection</h3>${refs.map(r=>'<div class="draggable-item" data-rid="'+r.id+'">'+r.text+'</div>').join('')}<button class="btn btn-primary" id="bchkD2">✅ Check Reflection</button><p id="fbD2"></p></div>`;
                    let selR=null; document.querySelectorAll('[data-rid]').forEach(el=>{ el.addEventListener('click',function(){ document.querySelectorAll('[data-rid]').forEach(e=>e.classList.remove('placed')); this.classList.add('placed'); selR=this.dataset.rid; }); });
                    document.getElementById('bchkD2').addEventListener('click',()=>{ if(selR==='r2'){ toast('✅ Perfect reflection!'); st.mypD=!0; if(!st.discMYP.includes('Criterion D')) st.discMYP.push('Criterion D'); sv(); showDiscD(); } else { document.getElementById('fbD2').style.color='var(--accent-red)'; document.getElementById('fbD2').textContent='Choose a reflection that is honest about successes and areas to improve.'; } });
                }
                function showDiscD(){ const d=document.getElementById('disc'); d.style.display='block'; d.innerHTML=`<div class="discovery-box"><span style="font-size:2.5rem;">💡</span><strong>Criterion D</strong><p>Testing your solution, honestly judging results, and identifying how to make it even better.</p><p style="color:var(--accent-orange);">✏️ Copy this definition.</p><div><input type="checkbox" id="cbD"><label>✅ I wrote it down.</label></div><button class="btn btn-success" id="bcD" disabled>➡️ Dashboard</button></div>`; document.getElementById('cbD').addEventListener('change',function(){ document.getElementById('bcD').disabled=!this.checked; }); document.getElementById('bcD').addEventListener('click',()=>goTo('dash')); }
            }

            // ---------- BRIDGE (larger slots, hidden requirement, subtle wrongs) ----------
            function renderBridge() {
                const ctConcepts = ['Decomposition','Abstraction','Algorithm Design','Pattern Recognition'];
                const mypPhases = ['Criterion A','Criterion B','Criterion C','Criterion D'];
                sc.innerHTML = `<div class="card"><span class="phase-badge badge-bridge">Bridge</span><h2>🌉 The Bridge</h2><p><span class="context-label">CONTEXT:</span> Now you will see how CT concepts can be applied across the whole design cycle.</p></div>
                <div class="card"><h3>Activity 1: Place CT concepts into the phases</h3><p>Drag the concepts onto the phases. (You can remove them by clicking.)</p>
                <div style="display:flex;gap:12px;flex-wrap:wrap;">
                <div style="flex:1;min-width:180px;"><h4>CT Concepts</h4><div id="ctPoolB"></div></div>
                <div style="flex:1;min-width:250px;" id="mypSlots"></div></div>
                <p id="b1Fb"></p><button class="btn btn-primary" id="bchkB1" disabled>✅ Check Activity 1</button></div>
                <div id="bridgeExamples" style="display:none;"></div>
                <div id="bridgeActivity3" style="display:none;"></div>
                <div id="disc" style="display:none;"></div>
                <button class="btn btn-outline btn-sm" onclick="window.goToPhase('dash')">↩️ Dashboard</button>`;
                const ctPool = document.getElementById('ctPoolB');
                ctConcepts.forEach(ct => {
                    const el = document.createElement('div'); el.className = 'ct-tag ct-' + ct.toLowerCase().replace(' ', '-');
                    el.textContent = ct; el.draggable = true; el.dataset.ct = ct;
                    el.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', ct); el.style.opacity='0.5'; });
                    el.addEventListener('dragend', () => { el.style.opacity='1'; });
                    ctPool.appendChild(el);
                });
                const slotContainer = document.getElementById('mypSlots'); const slotData = {};
                mypPhases.forEach(phase => {
                    const wrapper = document.createElement('div'); wrapper.style.marginBottom = '16px';
                    const title = document.createElement('strong'); title.textContent = phase;
                    const slotsDiv = document.createElement('div');
                    for (let i = 0; i < 4; i++) {
                        const slot = document.createElement('div'); slot.className = 'slot-box'; slot.dataset.slotindex = i;
                        slot.addEventListener('dragover', e => e.preventDefault());
                        slot.addEventListener('drop', e => {
                            e.preventDefault();
                            const ct = e.dataTransfer.getData('text/plain');
                            if (!slotData[phase]) slotData[phase] = [];
                            if (slotData[phase][i]) { toast('Slot filled.', 'error'); return; }
                            if (Object.values(slotData[phase]||{}).includes(ct)) { toast('Concept already used here.', 'error'); return; }
                            slotData[phase][i] = ct;
                            slot.textContent = ct; slot.classList.add('slot-filled');
                            updateBridgeCheck();
                        });
                        slot.addEventListener('click', () => {
                            if (slot.classList.contains('slot-filled')) {
                                delete slotData[phase][i];
                                slot.textContent = ''; slot.classList.remove('slot-filled');
                                updateBridgeCheck();
                            }
                        });
                        slotsDiv.appendChild(slot);
                    }
                    wrapper.appendChild(title); wrapper.appendChild(slotsDiv);
                    slotContainer.appendChild(wrapper);
                });
                function updateBridgeCheck() {
                    document.getElementById('bchkB1').disabled = !mypPhases.every(p => slotData[p] && Object.values(slotData[p]).length === 4);
                }
                document.getElementById('bchkB1').addEventListener('click', () => {
                    toast('✅ Good! You discovered every phase uses all four concepts.');
                    renderExamples(); renderActivity3();
                });
                function renderExamples() {
                    const examples = {
                        'Criterion A': [
                            {ct:'Decomposition', correct:'Breaking problem into air, thermal, power.', wrong:'Asking each crew member individually without grouping.'},
                            {ct:'Abstraction', correct:'Ignoring decorations to focus on life support.', wrong:'Removing temperature sensors because they seem complex.'},
                        ],
                        'Criterion B': [
                            {ct:'Algorithm Design', correct:'Step‑by‑step procedure to test solutions.', wrong:'A single sentence with no steps.'},
                            {ct:'Pattern Recognition', correct:'Comparing past failures to predict success.', wrong:'Assuming all solutions equally likely without data.'},
                        ],
                        'Criterion C': [
                            {ct:'Decomposition', correct:'Dividing construction into sub‑tasks.', wrong:'Assembling everything at once.'},
                            {ct:'Abstraction', correct:'Core components first, decorations later.', wrong:'Ignoring oxygen recycler because it has many wires.'},
                        ],
                        'Criterion D': [
                            {ct:'Pattern Recognition', correct:'Headaches only during high power draw.', wrong:'Deciding solution failed because one test was off.'},
                            {ct:'Algorithm Design', correct:'Clear test script to repeat measurements.', wrong:'Picking random readings and guessing.'},
                        ]
                    };
                    let html = '<div class="card"><h3>Activity 2: Choose the correct CT application</h3>';
                    for (const [phase, exs] of Object.entries(examples)) {
                        html += '<h4>' + phase + '</h4>';
                        exs.forEach(ex => {
                            html += '<p><strong>' + ex.ct + ':</strong></p>';
                            html += '<label><input type="radio" name="ex-' + phase + '-' + ex.ct + '" value="correct"> ' + ex.correct + '</label>';
                            html += '<label><input type="radio" name="ex-' + phase + '-' + ex.ct + '" value="wrong"> ' + ex.wrong + '</label>';
                        });
                    }
                    html += '<button class="btn btn-primary" id="bchkExamples">✅ Check</button><p id="exFb"></p></div>';
                    document.getElementById('bridgeExamples').innerHTML = html; document.getElementById('bridgeExamples').style.display='block';
                    document.getElementById('bchkExamples').addEventListener('click', () => {
                        let allCorrect = true;
                        document.querySelectorAll('#bridgeExamples input[type="radio"]:checked').forEach(r => { if(r.value!=='correct') allCorrect = false; });
                        if (allCorrect && document.querySelectorAll('#bridgeExamples input[type="radio"]:checked').length === 8) {
                            toast('✅ Well done!'); document.getElementById('exFb').style.color='var(--accent-green)';
                            document.getElementById('exFb').textContent = '✅ All correct!';
                            st.bridge = true; st.completedAt = new Date().toISOString(); sv();
                            showDiscBridge();
                        } else {
                            document.getElementById('exFb').style.color='var(--accent-red)';
                            document.getElementById('exFb').textContent = '❌ Some answers are not the best application.';
                        }
                    });
                }
                function renderActivity3() {
                    const reflections = [
                        { text:'The CT concepts are just another name for the MYP phases.', correct:false },
                        { text:'Each CT concept can be used in any MYP phase, making problem‑solving more effective.', correct:true },
                        { text:'Decomposition only works in Criterion A, Pattern Recognition only in Criterion D.', correct:false },
                        { text:'Abstraction and Algorithm Design are the same thing.', correct:false }
                    ];
                    let html = '<div class="card" style="margin-top:18px;"><h3>Activity 3: Reflection – Choose the most accurate statement about CT and MYP</h3>';
                    reflections.forEach(r => { html += '<label style="display:block;"><input type="radio" name="reflection" value="' + r.correct + '"> ' + r.text + '</label>'; });
                    html += '<button class="btn btn-primary" id="bchkReflection">✅ Submit Reflection</button><p id="refFb"></p></div>';
                    document.getElementById('bridgeActivity3').innerHTML = html; document.getElementById('bridgeActivity3').style.display='block';
                    document.getElementById('bchkReflection').addEventListener('click', () => {
                        const sel = document.querySelector('input[name="reflection"]:checked');
                        if (!sel) { toast('Select a reflection.', 'error'); return; }
                        if (sel.value === 'true') {
                            toast('✅ Excellent reflection! CT concepts are flexible tools.');
                            document.getElementById('refFb').style.color='var(--accent-green)';
                            document.getElementById('refFb').textContent = '✅ Correct!';
                            st.bridge = true; st.completedAt = new Date().toISOString(); sv();
                            showDiscBridge();
                        } else {
                            document.getElementById('refFb').style.color='var(--accent-red)';
                            document.getElementById('refFb').textContent = '❌ Not accurate — CT concepts apply across all phases.';
                        }
                    });
                }
                function showDiscBridge(){ const d=document.getElementById('disc'); d.style.display='block'; d.innerHTML=`<div class="discovery-box"><span style="font-size:2.5rem;">🌉</span><strong>The Bridge Complete!</strong><p>Computational Thinking concepts can be applied in every phase of the MYP Design Cycle.</p><div style="margin-top:10px;"><input type="checkbox" id="cbBrd"><label>✅ I understand CT concepts are flexible tools.</label></div><button class="btn btn-success" id="bcBrd" disabled>➡️ Full Report</button></div>`; document.getElementById('cbBrd').addEventListener('change',function(){ document.getElementById('bcBrd').disabled=!this.checked; }); document.getElementById('bcBrd').addEventListener('click',()=>goTo('completion')); }
            }

            // ---------- COMPLETION ----------
            function renderCompletion() {
                sc.innerHTML = `<div class="card" style="text-align:center;border-color:var(--accent-green);"><span class="celebration">🏆</span><h2>Congratulations, Engineer ${esc(st.studentName)}!</h2><p style="font-size:1.2rem;">The MYP-1 Space Station is saved. 🛰️✨</p></div><div class="card"><h2>📖 Complete Logbook (For Toddle)</h2><h3>🧠 Computational Thinking:</h3><ul>${['Decomposition','Abstraction','Algorithm Design','Pattern Recognition'].map(c=>'<li>'+(st.discCT.includes(c)?'✅':'⬜')+' <strong>'+c+'</strong></li>').join('')}</ul><h3>📋 MYP Design Cycle:</h3><ul>${['Criterion A','Criterion B','Criterion C','Criterion D'].map(c=>'<li>'+(st.discMYP.includes(c)?'✅':'⬜')+' <strong>'+c+'</strong></li>').join('')}</ul></div><div class="card" style="text-align:center;"><h3>🚀 Go to Toddle</h3><p>Complete your <strong>Exit Ticket</strong> and check the <strong>rubric</strong>.</p></div><button class="btn btn-outline btn-sm" onclick="window.goToPhase('dash')">↩️ Dashboard</button> <button class="btn btn-primary" id="brstF">🔄 New Mission</button>`;
                document.getElementById('brstF').addEventListener('click', ()=>{ if(confirm('Start over?')){ rst(); render('welcome'); } });
            }

            function init() {
                if (!st.studentName) render('welcome');
                else if (st.bridge) render('completion');
                else if (st.mypD) render('bridge');
                else if (st.mypC) render('mypD');
                else if (st.mypB) render('mypC');
                else if (st.mypA) render('mypB');
                else if (st.ct4) render('mypA');
                else if (st.ct3) render('ct4');
                else if (st.ct2) render('ct3');
                else if (st.ct1) render('ct2');
                else render('ct1');
            }
            init();
            console.log('🚀 MYP-1 v9 fully working');
        })();
    </script>
</body>
</html>
