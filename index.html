<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Mission: Save the MYP-1 Space Station</title>
    <style>
        :root {
            --bg-deep: #0a0e17; --bg-panel: #111827; --accent-cyan: #00e5ff; --accent-purple: #b388ff;
            --accent-green: #69f0ae; --accent-orange: #ffab40; --accent-pink: #ff80ab; --accent-red: #ff5252;
            --accent-yellow: #ffd740; --text-primary: #e0e0e0; --text-bright: #ffffff; --text-muted: #b0b0b0;
            --border-glow: #1e3a5f; --font-main: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            --radius-lg: 20px; --radius-md: 14px; --radius-sm: 10px; --shadow-card: 0 8px 32px rgba(0,0,0,0.4);
            --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-main); background: var(--bg-deep); color: var(--text-primary); min-height: 100vh; font-size: 1.1rem; line-height: 1.6; }
        .stars-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .star { position: absolute; border-radius: 50%; background: #fff; animation: twinkle var(--dur) ease-in-out infinite; animation-delay: var(--delay); opacity: 0; }
        @keyframes twinkle { 0%,100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 0.9; transform: scale(2); } }
        .app-wrapper { position: relative; z-index: 1; max-width: 950px; margin: 0 auto; padding: 20px 16px 40px; }
        .header { text-align: center; padding: 24px 20px 16px; }
        .header .logo-emoji { font-size: 3.5rem; display: block; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }
        .header h1 { font-size: 1.8rem; font-weight: 800; color: var(--text-bright); text-shadow: 0 0 40px rgba(0,229,255,0.4); }
        .card { background: var(--bg-panel); border: 1px solid var(--border-glow); border-radius: var(--radius-lg); padding: 24px 20px; margin: 14px 0; box-shadow: var(--shadow-card); }
        .card h2 { font-size: 1.35rem; color: var(--text-bright); margin-bottom: 10px; }
        .card h3 { font-size: 1.15rem; color: var(--accent-cyan); margin: 14px 0 6px; }
        .btn { display: inline-block; padding: 12px 26px; font-size: 1.05rem; font-weight: 700; border-radius: 50px; border: none; cursor: pointer; transition: var(--transition-smooth); font-family: var(--font-main); color: #000; }
        .btn-primary { background: var(--accent-cyan); box-shadow: 0 4px 20px rgba(0,229,255,0.35); }
        .btn-primary:hover { background: #4dffee; transform: translateY(-2px); }
        .btn-success { background: var(--accent-green); }
        .btn-outline { background: transparent; border: 2px solid var(--accent-cyan); color: var(--accent-cyan); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
        .phase-badge { display: inline-block; padding: 5px 14px; border-radius: 50px; font-weight: 700; font-size: 0.8rem; }
        .badge-ct { background: rgba(0,229,255,0.2); color: var(--accent-cyan); border: 1px solid var(--accent-cyan); }
        .badge-myp { background: rgba(179,136,255,0.2); color: var(--accent-purple); border: 1px solid var(--accent-purple); }
        .badge-bridge { background: rgba(255,215,64,0.2); color: var(--accent-yellow); border: 1px solid var(--accent-yellow); }
        .discovery-box { background: linear-gradient(135deg, #1a1040, #0d1b2a); border: 2px solid var(--accent-purple); border-radius: var(--radius-md); padding: 18px; margin: 14px 0; }
        .draggable-item { background: #1e2638; border: 1px solid #3a4458; border-radius: var(--radius-sm); padding: 8px 12px; margin: 5px 0; cursor: grab; font-size: 0.9rem; user-select: none; }
        .draggable-item.placed { background: #1a2e1a; border-color: var(--accent-green); cursor: default; }
        .draggable-item.wrong-placement { background: #2e1a1a; border-color: var(--accent-red); animation: shake 0.5s ease; }
        @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
        .panel-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin: 10px 0; }
        .panel-option { background: #1a1f2e; border: 3px solid #2a3040; border-radius: var(--radius-md); padding: 12px; cursor: pointer; text-align: center; min-height: 180px; }
        .panel-option.selected { border-color: var(--accent-green); background: #152018; }
        .btn-vital { background: #ff5252; color: #fff; width: 20px; height: 20px; border-radius: 50%; display: inline-block; margin: 2px; font-size: 0.6rem; line-height: 20px; }
        .btn-useless { background: #555; color: #aaa; width: 20px; height: 20px; border-radius: 50%; display: inline-block; margin: 2px; font-size: 0.6rem; line-height: 20px; }
        .condition-tag { display: inline-block; padding: 8px 14px; border-radius: 50px; font-weight: 700; font-size: 0.9rem; cursor: grab; background: #1e2638; border: 2px solid #3a4458; margin: 4px; }
        .discovery-dropzone { min-height: 80px; border: 3px dashed var(--accent-orange); border-radius: var(--radius-md); padding: 12px; display: flex; flex-wrap: wrap; gap: 8px; }
        .matching-slot { min-height: 55px; border: 2px dashed #3a4458; border-radius: var(--radius-sm); padding: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
        .ct-tag { display: inline-block; padding: 6px 12px; border-radius: 50px; font-weight: 700; font-size: 0.8rem; cursor: grab; margin: 2px; }
        .ct-decomp { background: rgba(0,229,255,0.2); border: 2px solid var(--accent-cyan); color: var(--accent-cyan); }
        .ct-abstr { background: rgba(179,136,255,0.2); border: 2px solid var(--accent-purple); color: var(--accent-purple); }
        .ct-algo { background: rgba(255,171,64,0.2); border: 2px solid var(--accent-orange); color: var(--accent-orange); }
        .ct-pattern { background: rgba(255,128,171,0.2); border: 2px solid var(--accent-pink); color: var(--accent-pink); }
        .toast { position: fixed; top: 20px; right: 20px; background: #1a1f2e; border: 2px solid var(--accent-green); color: #fff; padding: 12px 20px; border-radius: var(--radius-sm); z-index: 999; font-weight: 700; animation: slideIn 0.4s ease, fadeOut 0.5s ease 2.5s forwards; }
        @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }
        .step-border { border: 2px solid #3a4458; border-radius: var(--radius-sm); padding: 8px 12px; margin: 4px 0; transition: border-color 0.3s; }
        .step-correct { border-color: var(--accent-green) !important; box-shadow: 0 0 12px rgba(105,240,174,0.4); }
        .sentence-card { background: #1a1f2e; border: 2px solid #2a3040; border-radius: var(--radius-md); padding: 14px; margin: 8px 0; cursor: pointer; transition: all 0.3s; }
        .selected-sentence { border-color: var(--accent-purple) !important; background: rgba(179,136,255,0.15); box-shadow: 0 0 16px rgba(179,136,255,0.3); }
        .slot-box { display: inline-block; width: 32px; height: 32px; border: 2px dashed #555; border-radius: 50%; margin: 0 4px; vertical-align: middle; text-align: center; line-height: 28px; font-size: 0.8rem; }
        .slot-filled { border-color: var(--accent-cyan); background: rgba(0,229,255,0.15); }
        @media (max-width: 600px) { .header h1 { font-size: 1.3rem; } .card { padding: 16px 12px; } }
    </style>
</head>
<body>
    <div class="stars-container" id="starsContainer" aria-hidden="true"></div>
    <div id="toastContainer"></div>
    <div class="app-wrapper">
        <div class="header"><span class="logo-emoji">🛰️</span><h1>Mission: Save the MYP-1 Space Station</h1><p class="subtitle">🚀 Engineering Emergency Protocol</p></div>
        <div id="screenContainer"></div>
    </div>
    <script>
        // Global error handler – will display any JS error on the page instead of a blank screen
        window.onerror = function(message, source, lineno, colno, error) {
            document.getElementById('screenContainer').innerHTML =
                '<div class="card" style="color:var(--accent-red)"><h2>⚠️ Script Error</h2><pre style="white-space:pre-wrap;word-break:break-word;">' +
                message + '\n\n' + (error && error.stack ? error.stack : '') +
                '</pre><p>Check console for details.</p></div>';
            console.error(error);
            return true;
        };

        (function() {
            const sc = document.getElementById('screenContainer');
            const tc = document.getElementById('toastContainer');
            // Generate stars
            for (let i = 0; i < 100; i++) {
                const s = document.createElement('div');
                s.classList.add('star');
                const sz = Math.random() * 3 + 1;
                s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${Math.random()*3+2}s;--delay:${Math.random()*5}s`;
                document.getElementById('starsContainer').appendChild(s);
            }

            const SK = 'myp1_v8';
            let st = (() => {
                try { const r = localStorage.getItem(SK); return r ? JSON.parse(r) : null; }
                catch (e) { return null; }
            })() || {
                studentName: '', ct1: false, ct2: false, ct3: false, ct4: false,
                mypA: false, mypB: false, mypC: false, mypD: false, bridge: false,
                discCT: [], discMYP: [], bridgeAnswers: {}, startedAt: null, completedAt: null
            };

            function sv() { localStorage.setItem(SK, JSON.stringify(st)); }
            function rst() {
                st = {
                    studentName: '', ct1: false, ct2: false, ct3: false, ct4: false,
                    mypA: false, mypB: false, mypC: false, mypD: false, bridge: false,
                    discCT: [], discMYP: [], bridgeAnswers: {}, startedAt: null, completedAt: null
                };
                sv();
            }

            function toast(m, t = 'success') {
                const el = document.createElement('div');
                el.className = 'toast';
                el.textContent = m;
                if (t === 'error') el.style.borderColor = 'var(--accent-red)';
                tc.appendChild(el);
                setTimeout(() => el.remove(), 3000);
            }

            function esc(s) {
                const d = document.createElement('div');
                d.textContent = s;
                return d.innerHTML;
            }

            function render(scr) {
                sc.innerHTML = '';
                switch (scr) {
                    case 'welcome': renderWelcome(); break;
                    case 'dash': renderDash(); break;
                    case 'ct1': renderCT1(); break;
                    case 'ct2': renderCT2(); break;
                    case 'ct3': renderCT3(); break;
                    case 'ct4': renderCT4(); break;
                    case 'mypA': renderMYPA(); break;
                    case 'mypB': renderMYPB(); break;
                    case 'mypC': renderMYPC(); break;
                    case 'mypD': renderMYPD(); break;
                    case 'bridge': renderBridge(); break;
                    case 'completion': renderCompletion(); break;
                    default: renderWelcome();
                }
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            function goTo(id) {
                const m = { ct1:'ct1', ct2:'ct2', ct3:'ct3', ct4:'ct4', mypA:'mypA', mypB:'mypB', mypC:'mypC', mypD:'mypD', bridge:'bridge' };
                if (!m[id]) { render(id); return; }
                if (st[id]) { toast('⚠️ Already completed.', 'error'); render('dash'); return; }
                const order = ['ct1','ct2','ct3','ct4','mypA','mypB','mypC','mypD','bridge'];
                const idx = order.indexOf(id);
                if (idx > 0 && !st[order[idx-1]]) {
                    toast('⚠️ Complete the previous phase first.', 'error');
                    render('dash');
                    return;
                }
                render(id);
            }
            window.goToPhase = goTo;

            // ---------- Welcome ----------
            function renderWelcome() {
                sc.innerHTML = `<div class="card" style="text-align:center;"><span style="font-size:4rem;">🛸</span><h2>Welcome, Engineer!</h2><p style="font-size:1.1rem;">The <strong>MYP-1 Space Station</strong> life support has failed.</p><p>Complete <strong>4 CT missions</strong>, <strong>4 MYP phases</strong>, and a <strong>Bridge Reflection</strong>.</p><p style="color:var(--accent-orange);">⚠️ Keep your notebook ready for your Toddle Exit Ticket!</p><div style="margin:18px 0;"><label for="ni">🔧 Enter your name:</label><input type="text" id="ni" placeholder="Your name..." maxlength="60"></div><button class="btn btn-primary" id="bs" disabled>🚀 Begin Mission</button></div>`;
                const ni = document.getElementById('ni');
                const bs = document.getElementById('bs');
                if (st.studentName) { ni.value = st.studentName; bs.disabled = false; }
                ni.addEventListener('input', () => bs.disabled = ni.value.trim().length < 2);
                bs.addEventListener('click', () => {
                    const n = ni.value.trim();
                    if (n.length < 2) { toast('Enter your name.', 'error'); return; }
                    st.studentName = n;
                    if (!st.startedAt) st.startedAt = new Date().toISOString();
                    sv();
                    render('dash');
                });
            }

            // ---------- Dashboard ----------
            function renderDash() {
                const all = [
                    { id:'ct1', n:1, t:'Decomposition', c:st.ct1, u:true, em:'🔍', sec:'ct' },
                    { id:'ct2', n:2, t:'Abstraction', c:st.ct2, u:st.ct1, em:'🧹', sec:'ct' },
                    { id:'ct3', n:3, t:'Algorithm Design', c:st.ct3, u:st.ct2, em:'⚙️', sec:'ct' },
                    { id:'ct4', n:4, t:'Pattern Recognition', c:st.ct4, u:st.ct3, em:'📊', sec:'ct' },
                    { id:'mypA', n:5, t:'Inquiry & Analysis', c:st.mypA, u:st.ct4, em:'🔎', sec:'myp' },
                    { id:'mypB', n:6, t:'Developing Ideas', c:st.mypB, u:st.mypA, em:'💡', sec:'myp' },
                    { id:'mypC', n:7, t:'Creating the Solution', c:st.mypC, u:st.mypB, em:'🔧', sec:'myp' },
                    { id:'mypD', n:8, t:'Evaluation', c:st.mypD, u:st.mypC, em:'📝', sec:'myp' },
                    { id:'bridge', n:9, t:'The Bridge', c:st.bridge, u:st.mypD, em:'🌉', sec:'bridge' }
                ];
                const comp = all.filter(p=>p.c).length;
                const pct = Math.round((comp/9)*100);
                sc.innerHTML = `<div class="card" style="text-align:center;"><p>👩‍🚀 Engineer <strong>${esc(st.studentName)}</strong></p><div class="progress-track" style="width:100%;height:12px;background:#1e2638;border-radius:50px;margin:8px 0;"><div style="width:${pct}%;height:100%;background:linear-gradient(90deg,var(--accent-cyan),var(--accent-green));border-radius:50px;"></div></div><p style="font-size:0.85rem;">${comp}/9 phases (${pct}%)</p></div>${['🧠 Computational Thinking','📋 MYP Design Cycle','🌉 The Bridge'].map((title,i)=>{
                    const phases = all.filter(p=>p.sec===['ct','myp','bridge'][i]);
                    return `<p style="color:var(--accent-cyan);font-weight:700;margin:16px 0 8px;">${title}</p>${phases.map(p=>{
                        const lk = p.u && !p.c ? '' : 'locked';
                        const act = p.u && !p.c ? `onclick="window.goToPhase('${p.id}')"` : '';
                        return `<div class="card ${lk}" style="cursor:${p.u&&!p.c?'pointer':'default'};" ${act}><h2>${p.c?'✅':'🟢'} ${p.em} Phase ${p.n}: ${p.t}</h2>${p.c?'<p style="color:var(--accent-green);">✔️ Completed</p>':(p.u?'<p style="color:var(--accent-cyan);">Click to start</p>':'')}</div>`;
                    }).join('')}`;
                }).join('')}${st.bridge?`<div class="card" style="text-align:center;border-color:var(--accent-green);"><span style="font-size:3rem;">🏆</span><h2>Mission Accomplished!</h2><button class="btn btn-success" onclick="window.goToPhase('completion')">📋 Full Report</button></div>`:''}<button class="btn btn-outline btn-sm" id="brst">🔄 Restart</button>`;
                document.getElementById('brst').addEventListener('click', ()=>{
                    if(confirm('Restart?')){ rst(); render('welcome'); toast('Reset.'); }
                });
            }

            // ---------- CT1: Decomposition ----------
            function renderCT1() {
                const problem = "The space station's life support is failing. Oxygen levels fluctuate, temperature varies wildly, the power grid is unstable, and the crew reports various health complaints.";
                const statements = [
                    { id:'s1', text:'Investigate oxygen recycler efficiency separately from temperature control.', valid:true },
                    { id:'s2', text:'Group crew health complaints by symptom type (headaches, nausea, fatigue).', valid:true },
                    { id:'s3', text:'Analyse power consumption of each subsystem independently.', valid:true },
                    { id:'s4', text:'Check the cafeteria menu for crew preferences.', valid:false },
                    { id:'s5', text:'Separate the problem into: air quality, thermal regulation, and power distribution.', valid:true },
                    { id:'s6', text:'Focus only on the captain\'s favourite control panel.', valid:false },
                    { id:'s7', text:'Break down the timeline: what failed first, second, and third.', valid:true },
                    { id:'s8', text:'List all components in the life support system and test each one.', valid:true },
                    { id:'s9', text:'Investigate whether the issue is related to the recent solar storm.', valid:true },
                    { id:'s10', text:'Count the total number of blinking lights on the console.', valid:false },
                    { id:'s11', text:'Separate sensor data from crew subjective reports.', valid:true },
                    { id:'s12', text:'Check which astronaut has the nicest handwriting for the logbook.', valid:false },
                ];
                const shuf = [...statements].sort(()=>Math.random()-0.5);
                sc.innerHTML = `<div class="card"><span class="phase-badge badge-ct">CT Phase 1</span><h2>🔍 Decomposition</h2><p><strong>Computational Thinking: Decomposition</strong> — breaking a complex problem into smaller, manageable parts.</p><p style="font-style:italic;color:var(--text-muted);">"${problem}"</p><p>Select <strong>only the valid decomposition statements</strong> (the ones that truly help break down the problem).</p><p style="color:var(--accent-orange); margin-top:10px;">✏️ Remember to copy the term <strong>Decomposition</strong> and its definition into your notebook.</p></div><div style="display:flex;flex-wrap:wrap;gap:6px;">${shuf.map(s=>'<div class="draggable-item" data-sid="'+s.id+'" style="cursor:pointer;">'+s.text+'</div>').join('')}</div><p id="selCount">0 statements selected</p><button class="btn btn-primary" id="bchk1">✅ Check Decomposition</button><p id="fb1"></p><div id="disc" style="display:none;"></div><button class="btn btn-outline btn-sm" onclick="window.goToPhase('dash')">↩️ Dashboard</button>`;
                let sel = [];
                document.querySelectorAll('[data-sid]').forEach(el => {
                    el.addEventListener('click', function(){
                        const id = this.dataset.sid;
                        if(sel.includes(id)){
                            sel = sel.filter(x=>x!==id);
                            this.classList.remove('placed');
                        } else {
                            sel.push(id);
                            this.classList.add('placed');
                        }
                        document.getElementById('selCount').textContent = sel.length + ' statements selected';
                    });
                });
                document.getElementById('bchk1').addEventListener('click', ()=>{
                    const validIds = statements.filter(s=>s.valid).map(s=>s.id);
                    const allValidSelected = validIds.every(id=>sel.includes(id));
                    const noInvalidSelected = sel.every(id=>validIds.includes(id));
                    if(allValidSelected && noInvalidSelected){
                        toast('✅ Correct! Decomposition complete.');
                        st.ct1 = true;
                        if(!st.discCT.includes('Decomposition')) st.discCT.push('Decomposition');
                        sv();
                        showDisc1();
                    } else {
                        document.getElementById('fb1').style.color='var(--accent-red)'; document.getElementById('fb1').textContent='❌ Not quite. Remember: a good decomposition breaks the problem into useful, separate parts. Remove irrelevant ones.';
                    }
                });
                function showDisc1(){
                    const d=document.getElementById('disc'); d.style.display='block';
                    d.innerHTML=`<div class="discovery-box"><span style="font-size:2.5rem;">💡</span><strong>Decomposition</strong><p>Breaking a big, complicated problem into smaller, easier-to-handle pieces. This helps you understand each part clearly before solving the whole thing.</p><p style="color:var(--accent-orange);">✏️ Copy this definition into your notebook.</p><div style="margin-top:10px;display:flex;align-items:center;gap:8px;"><input type="checkbox" id="cb1"><label for="cb1">✅ I wrote it down.</label></div><button class="btn btn-success" id="bc1" disabled>➡️ Dashboard</button></div>`;
                    document.getElementById('cb1').addEventListener('change',function(){ document.getElementById('bc1').disabled=!this.checked; });
                    document.getElementById('bc1').addEventListener('click',()=>goTo('dash'));
                }
            }

            // ---------- CT2: Abstraction ----------
            function renderCT2() {
                const ctrls = [{l:'Temperature Sensor',v:true},{l:'Pressure Valve',v:true},{l:'Fuel Flow Regulator',v:true},{l:'Ignition Spark',v:true},{l:'Disco Lights',v:false},{l:'Sweet Dispenser',v:false},{l:'Music Player',v:false},{l:'Coffee Machine',v:false},{l:'Selfie Camera',v:false},{l:'Party Mode',v:false},{l:'Star Map',v:false},{l:'Game Console',v:false}];
                const shuf = [...ctrls].sort(()=>Math.random()-0.5);
                const vLabels = ctrls.filter(c=>c.v).map(c=>c.l);
                const panels = [
                    {id:'P1',n:'Panel Titan',btns:['Temperature Sensor','Pressure Valve','Fuel Flow Regulator','Ignition Spark'],ok:true},
                    {id:'P2',n:'Panel Nova',btns:['Temperature Sensor','Pressure Valve','Fuel Flow Regulator','Disco Lights'],ok:false},
                    {id:'P3',n:'Panel Eclipse',btns:['Temperature Sensor','Pressure Valve','Fuel Flow Regulator','Ignition Spark','Coffee Machine'],ok:false},
                    {id:'P4',n:'Panel Aurora',btns:['Temperature Sensor','Pressure Valve','Music Player','Ignition Spark'],ok:false},
                    {id:'P5',n:'Panel Storm',btns:['Temperature Sensor','Pressure Valve','Fuel Flow Regulator','Ignition Spark','Selfie Camera','Game Console'],ok:false},
                    {id:'P6',n:'Panel Zenith',btns:['Temperature Sensor','Pressure Valve','Sweet Dispenser','Ignition Spark','Fuel Flow Regulator'],ok:false}
                ];
                const blueprints = [
                    {id:'B1',n:'Blueprint Alpha',src:'Blueprint1.png',lvl:'too_detailed'},
                    {id:'B2',n:'Blueprint Beta',src:'Blueprint2.png',lvl:'correct'},
                    {id:'B3',n:'Blueprint Gamma',src:'Blueprint3.png',lvl:'too_simple'},
                    {id:'B4',n:'Blueprint Delta',src:'Blueprint4.png',lvl:'cluttered'},
                    {id:'B5',n:'Blueprint Epsilon',src:'Blueprint5.png',lvl:'cluttered'},
                ];

            // ---------- MYP B, C, D ----------
            function renderMYPB() {
                const proposals = [{id:'p1',n:'Proposal Alpha',d:'Replace entire system. 3 days, 50k credits, 95% success.',s:4,c:2,r:3},{id:'p2',n:'Proposal Beta',d:'Patch with spares. 6 hours, 5k credits, 70% success.',s:3,c:5,r:4},{id:'p3',n:'Proposal Gamma',d:'Reroute auxiliary power. 2 hours, 500 credits, 85% success.',s:4,c:4,r:5},{id:'p4',n:'Proposal Delta',d:'Temporary external module. 12 hours, 15k credits, 90% success.',s:3,c:3,r:4},{id:'p5',n:'Proposal Epsilon',d:'Wait and hope. 0 hours, 0 credits, 5% success.',s:1,c:5,r:1}];
                sc.innerHTML = `<div class="card"><span class="phase-badge badge-myp">MYP Phase B</span><h2>💡 Developing Ideas</h2><p><strong>Criterion B</strong> — Coming up with different possible solutions and choosing the best one based on criteria.</p><p>Review the 5 design proposals. <strong>Select the top 2</strong> that best balance safety, speed, and resource use.</p><p style="color:var(--accent-orange);">✏️ Copy the term <strong>Criterion B</strong> and its definition into your notebook.</p></div><div>${proposals.map(p=>'<div class="sentence-card" data-pid="'+p.id+'"><h4>'+p.n+'</h4><p style="font-size:0.85rem;">'+p.d+'</p><p style="font-size:0.75rem;color:var(--text-muted);">Safety: '+ '⭐'.repeat(p.s)+' | Speed: '+ '⏱️'.repeat(p.c)+' | Resources: '+ '💰'.repeat(p.r)+'</p></div>').join('')}</div><p id="selFb">Selected: 0/2</p><button class="btn btn-primary" id="bchkB" disabled>✅ Submit Selection</button><div id="disc" style="display:none;"></div><button class="btn btn-outline btn-sm" onclick="window.goToPhase('dash')">↩️ Dashboard</button>`;
                let selP=[];
                document.querySelectorAll('.sentence-card').forEach(card=>{ card.addEventListener('click',function(){ const pid=this.dataset.pid; if(selP.includes(pid)){ selP=selP.filter(x=>x!==pid); this.classList.remove('selected-sentence'); } else { if(selP.length>=2){ const firstPid = selP.shift(); document.querySelector(`.sentence-card[data-pid="${firstPid}"]`)?.classList.remove('selected-sentence'); } selP.push(pid); this.classList.add('selected-sentence'); } document.getElementById('selFb').textContent='Selected: '+selP.length+'/2'; document.getElementById('bchkB').disabled=selP.length!==2; }); });
                document.getElementById('bchkB').addEventListener('click',()=>{ const best=['p3','p4']; const ok=best.every(x=>selP.includes(x)) && selP.every(x=>best.includes(x)); if(ok){ toast('✅ Best proposals selected!'); st.mypB=true; if(!st.discMYP.includes('Criterion B')) st.discMYP.push('Criterion B'); sv(); showDiscB(); } else { toast('Consider the best balance.', 'error'); } });
                function showDiscB(){ const d=document.getElementById('disc'); d.style.display='block'; d.innerHTML=`<div class="discovery-box"><span style="font-size:2.5rem;">💡</span><strong>Criterion B – Developing Ideas</strong><p>You generate different design ideas and then evaluate them against criteria (like safety, cost, speed) to pick the most promising one to build.</p><p style="color:var(--accent-orange);">✏️ Copy this definition into your notebook.</p><div style="margin-top:10px;display:flex;align-items:center;gap:8px;"><input type="checkbox" id="cbB"><label for="cbB">✅ I wrote it down.</label></div><button class="btn btn-success" id="bcB" disabled>➡️ Dashboard</button></div>`; document.getElementById('cbB').addEventListener('change',function(){ document.getElementById('bcB').disabled=!this.checked; }); document.getElementById('bcB').addEventListener('click',()=>goTo('dash')); }
            }

            function renderMYPC() {
                sc.innerHTML = `<div class="card"><span class="phase-badge badge-myp">MYP Phase C</span><h2>🔧 Creating the Solution</h2><p><strong>Criterion C</strong> — Following your plan, building the solution, and documenting any changes you make along the way.</p><p>Follow the plan. <strong>One step needs a justified change.</strong></p><p style="color:var(--accent-orange);">✏️ Copy the term <strong>Criterion C</strong> and its definition into your notebook.</p></div><div class="card"><ol><li>Shut down auxiliary power</li><li>Reroute cables</li><li>Replace damaged filter</li><li>Run diagnostic</li><li>Restore power</li></ol><p><strong>Problem:</strong> "During Step 3, the spare filter is also damaged."</p><div id="choices">${['A) Skip it','B) Use an older filter (works, documented)','C) Stop 3 days for new filter','D) Ask crew to repair manually'].map((c,i)=>'<label style="display:block;padding:8px;cursor:pointer;"><input type="radio" name="ch" value="'+i+'"> '+c+'</label>').join('')}</div><p id="chFb"></p><button class="btn btn-primary" id="bchkC">✅ Submit Decision</button></div><div id="disc" style="display:none;"></div><button class="btn btn-outline btn-sm" onclick="window.goToPhase('dash')">↩️ Dashboard</button>`;
                document.getElementById('bchkC').addEventListener('click',()=>{ const sel=document.querySelector('input[name="ch"]:checked'); if(!sel){ toast('Select an option.','error'); return; } if(sel.value==='1'){ toast('✅ Good decision, documented change!'); st.mypC=true; if(!st.discMYP.includes('Criterion C')) st.discMYP.push('Criterion C'); sv(); showDiscC(); } else { toast('Think about what keeps the project moving safely.','error'); } });
                function showDiscC(){ const d=document.getElementById('disc'); d.style.display='block'; d.innerHTML=`<div class="discovery-box"><span style="font-size:2.5rem;">💡</span><strong>Criterion C – Creating the Solution</strong><p>This is the "making" phase. You follow your plan to build the solution, but you also record any changes you have to make and explain why.</p><p style="color:var(--accent-orange);">✏️ Copy this definition into your notebook.</p><div style="margin-top:10px;display:flex;align-items:center;gap:8px;"><input type="checkbox" id="cbC"><label for="cbC">✅ I wrote it down.</label></div><button class="btn btn-success" id="bcC" disabled>➡️ Dashboard</button></div>`; document.getElementById('cbC').addEventListener('change',function(){ document.getElementById('bcC').disabled=!this.checked; }); document.getElementById('bcC').addEventListener('click',()=>goTo('dash')); }
            }

            function renderMYPD() {
                sc.innerHTML = `<div class="card"><span class="phase-badge badge-myp">MYP Phase D</span><h2>📝 Evaluation</h2><p><strong>Criterion D</strong> — Testing your solution, looking at the results, and deciding how to make it even better next time.</p><p>Review the test results after one week.</p><p style="color:var(--accent-orange);">✏️ Copy the term <strong>Criterion D</strong> and its definition into your notebook.</p></div><div class="card"><p>✅ Oxygen: 95% (was 40%)<br>✅ Temp: stable 22°C<br>⚠️ Power use: 15% higher<br>❌ One crew member still has headaches</p><div id="impChoices">${['Optimise power consumption','Investigate the headache issue','Replace the system again','Add decorations'].map((c,i)=>'<label style="display:block;padding:8px;cursor:pointer;"><input type="radio" name="imp" value="'+i+'"> '+c+'</label>').join('')}</div><p id="impFb"></p><button class="btn btn-primary" id="bchkD">✅ Submit Evaluation</button></div><div id="disc" style="display:none;"></div><button class="btn btn-outline btn-sm" onclick="window.goToPhase('dash')">↩️ Dashboard</button>`;
                document.getElementById('bchkD').addEventListener('click',()=>{ const sel=document.querySelector('input[name="imp"]:checked'); if(!sel){ toast('Select an improvement.','error'); return; } if(sel.value==='0' || sel.value==='1'){ toast('✅ Honest evaluation noted!'); st.mypD=true; if(!st.discMYP.includes('Criterion D')) st.discMYP.push('Criterion D'); sv(); showDiscD(); } else { toast('Focus on real issues found during testing.','error'); } });
                function showDiscD(){ const d=document.getElementById('disc'); d.style.display='block'; d.innerHTML=`<div class="discovery-box"><span style="font-size:2.5rem;">💡</span><strong>Criterion D – Evaluation</strong><p>After testing, you honestly judge how well your solution worked. You identify what went well, what didn't, and what you would improve if you did it again.</p><p style="color:var(--accent-orange);">✏️ Copy this definition into your notebook.</p><div style="margin-top:10px;display:flex;align-items:center;gap:8px;"><input type="checkbox" id="cbD"><label for="cbD">✅ I wrote it down.</label></div><button class="btn btn-success" id="bcD" disabled>➡️ Dashboard</button></div>`; document.getElementById('cbD').addEventListener('change',function(){ document.getElementById('bcD').disabled=!this.checked; }); document.getElementById('bcD').addEventListener('click',()=>goTo('dash')); }
            }

            // ---------- Bridge ----------
            function renderBridge() {
                const ctConcepts = ['Decomposition','Abstraction','Algorithm Design','Pattern Recognition'];
                const mypPhases = ['Criterion A','Criterion B','Criterion C','Criterion D'];
                sc.innerHTML = `<div class="card"><span class="phase-badge badge-bridge">Bridge</span><h2>🌉 The Bridge</h2><p>Computational Thinking concepts are flexible tools — they can apply to <strong>any</strong> phase of the MYP Design Cycle.</p></div>
                <div class="card"><h3>Activity 1: Place all 4 CT concepts into each MYP phase</h3><p>Each phase has 4 slots. Drag one CT concept into every slot. All phases must be filled.</p>
                <div style="display:flex;gap:12px;flex-wrap:wrap;">
                <div style="flex:1;min-width:180px;"><h4>CT Concepts</h4><div id="ctPoolB"></div></div>
                <div style="flex:1;min-width:200px;" id="mypSlots"></div></div>
                <p id="b1Fb"></p><button class="btn btn-primary" id="bchkB1" disabled>✅ Check Activity 1</button></div>
                <div id="bridgeExamples" style="display:none;"></div>
                <div id="bridgeActivity3" style="display:none;"></div>
                <div id="disc" style="display:none;"></div>
                <button class="btn btn-outline btn-sm" onclick="window.goToPhase('dash')">↩️ Dashboard</button>`;

                const ctPool = document.getElementById('ctPoolB');
                ctConcepts.forEach(ct => {
                    const el = document.createElement('div');
                    el.className = 'ct-tag ct-' + ct.toLowerCase().replace(' ', '-');
                    el.textContent = ct;
                    el.draggable = true;
                    el.dataset.ct = ct;
                    el.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', ct); el.style.opacity='0.5'; });
                    el.addEventListener('dragend', () => { el.style.opacity='1'; });
                    ctPool.appendChild(el);
                });

                const slotContainer = document.getElementById('mypSlots');
                const slotData = {};
                mypPhases.forEach(phase => {
                    const wrapper = document.createElement('div');
                    wrapper.style.marginBottom = '12px';
                    const title = document.createElement('strong');
                    title.textContent = phase;
                    const slotsDiv = document.createElement('div');
                    slotsDiv.className = 'slots-row';
                    slotsDiv.dataset.mypid = phase;
                    for (let i = 0; i < 4; i++) {
                        const slot = document.createElement('div');
                        slot.className = 'slot-box';
                        slot.dataset.slotindex = i;
                        slot.addEventListener('dragover', e => e.preventDefault());
                        slot.addEventListener('drop', e => {
                            e.preventDefault();
                            const ct = e.dataTransfer.getData('text/plain');
                            if (!slotData[phase]) slotData[phase] = [];
                            if (slotData[phase][i]) { toast('Slot already filled. Remove it first.', 'error'); return; }
                            if (Object.values(slotData[phase] || {}).includes(ct)) { toast('Concept already used in this phase.', 'error'); return; }
                            slotData[phase][i] = ct;
                            slot.textContent = ct;
                            slot.classList.add('slot-filled');
                            updateBridgeCheck();
                        });
                        slot.addEventListener('click', () => {
                            if (slot.classList.contains('slot-filled')) {
                                const ct = slotData[phase][i];
                                delete slotData[phase][i];
                                slot.textContent = '';
                                slot.classList.remove('slot-filled');
                                updateBridgeCheck();
                            }
                        });
                        slotsDiv.appendChild(slot);
                    }
                    wrapper.appendChild(title);
                    wrapper.appendChild(slotsDiv);
                    slotContainer.appendChild(wrapper);
                });

                function updateBridgeCheck() {
                    const allFilled = mypPhases.every(p => slotData[p] && Object.values(slotData[p]).length === 4);
                    document.getElementById('bchkB1').disabled = !allFilled;
                }

                document.getElementById('bchkB1').addEventListener('click', () => {
                    toast('✅ All concepts placed! Now see how they connect.');
                    document.getElementById('b1Fb').style.color='var(--accent-green)';
                    document.getElementById('b1Fb').textContent = '✅ Great! Every CT concept can support every MYP phase.';
                    renderExamples();
                    renderActivity3();
                });

                function renderExamples() {
                    const examples = {
                        'Criterion A': [
                            {ct:'Decomposition', correct:'Breaking the problem into "air quality", "temperature", and "power" sub-problems.', wrong:'Ignoring all crew complaints because they seem emotional.'},
                            {ct:'Abstraction', correct:'Ignoring irrelevant decorations to focus on life support essentials.', wrong:'Leaving out important technical specs.'},
                        ],
                        'Criterion B': [
                            {ct:'Algorithm Design', correct:'Creating a step-by-step plan to test possible solutions.', wrong:'Writing a single idea without a clear sequence.'},
                            {ct:'Pattern Recognition', correct:'Comparing past failures to identify which solution might work.', wrong:'Ignoring previous data completely.'},
                        ],
                        'Criterion C': [
                            {ct:'Decomposition', correct:'Dividing the construction into smaller tasks.', wrong:'Trying to do everything at once.'},
                            {ct:'Abstraction', correct:'Focusing on the critical components first.', wrong:'Getting lost in minor details during building.'},
                        ],
                        'Criterion D': [
                            {ct:'Pattern Recognition', correct:'Noticing that the headache issue only occurs with certain settings.', wrong:'Assuming the solution is perfect after one test.'},
                            {ct:'Algorithm Design', correct:'Writing a clear test procedure to evaluate each part.', wrong:'Testing randomly with no plan.'},
                        ]
                    };
                    let html = '<div class="card" style="margin-top:18px;"><h3>Activity 2: Choose the correct example of CT applied in each MYP phase</h3>';
                    for (const [phase, exs] of Object.entries(examples)) {
                        html += '<h4>' + phase + '</h4>';
                        exs.forEach(ex => {
                            html += '<p><strong>' + ex.ct + ':</strong></p>';
                            html += '<label style="display:block;padding:6px;"><input type="radio" name="ex-' + phase + '-' + ex.ct + '" value="correct"> ' + ex.correct + '</label>';
                            html += '<label style="display:block;padding:6px;"><input type="radio" name="ex-' + phase + '-' + ex.ct + '" value="wrong"> ' + ex.wrong + '</label>';
                        });
                    }
                    html += '<button class="btn btn-primary" id="bchkExamples">✅ Check Examples</button><p id="exFb"></p></div>';
                    document.getElementById('bridgeExamples').innerHTML = html;
                    document.getElementById('bridgeExamples').style.display = 'block';

                    document.getElementById('bchkExamples').addEventListener('click', () => {
                        let allCorrect = true;
                        document.querySelectorAll('#bridgeExamples input[type="radio"]:checked').forEach(radio => {
                            if (radio.value !== 'correct') allCorrect = false;
                        });
                        if (allCorrect && document.querySelectorAll('#bridgeExamples input[type="radio"]:checked').length === Object.values(examples).flat().length) {
                            toast('✅ You understand the CT‑MYP connection!');
                            document.getElementById('exFb').style.color='var(--accent-green)';
                            document.getElementById('exFb').textContent = '✅ All correct!';
                            st.bridge = true; st.completedAt = new Date().toISOString(); sv();
                            showDiscBridge();
                        } else {
                            document.getElementById('exFb').style.color='var(--accent-red)';
                            document.getElementById('exFb').textContent = '❌ Check the examples again.';
                        }
                    });
                }

                function renderActivity3() {
                    const reflections = [
                        { text:'The CT concepts are just another name for the MYP phases.', correct:false },
                        { text:'Each CT concept can be used in any MYP phase, making problem‑solving more effective.', correct:true },
                        { text:'Decomposition only works in Criterion A, and Pattern Recognition only in Criterion D.', correct:false },
                        { text:'Abstraction and Algorithm Design are the same thing.', correct:false },
                    ];
                    let html = '<div class="card" style="margin-top:18px;"><h3>Activity 3: Reflection – Choose the most accurate statement about CT and MYP</h3>';
                    reflections.forEach((r, i) => {
                        html += '<label style="display:block;padding:6px;"><input type="radio" name="reflection" value="' + r.correct + '"> ' + r.text + '</label>';
                    });
                    html += '<button class="btn btn-primary" id="bchkReflection">✅ Submit Reflection</button><p id="refFb"></p></div>';
                    document.getElementById('bridgeActivity3').innerHTML = html;
                    document.getElementById('bridgeActivity3').style.display = 'block';

                    document.getElementById('bchkReflection').addEventListener('click', () => {
                        const selected = document.querySelector('input[name="reflection"]:checked');
                        if (!selected) { toast('Select a reflection.', 'error'); return; }
                        if (selected.value === 'true') {
                            toast('✅ Excellent reflection! CT concepts are flexible tools.');
                            document.getElementById('refFb').style.color='var(--accent-green)';
                            document.getElementById('refFb').textContent = '✅ Correct!';
                            st.bridge = true; st.completedAt = new Date().toISOString(); sv();
                            showDiscBridge();
                        } else {
                            document.getElementById('refFb').style.color='var(--accent-red)';
                            document.getElementById('refFb').textContent = '❌ Not accurate — CT concepts apply across all phases.';
                        }
                    });
                }

                function showDiscBridge() {
                    const d = document.getElementById('disc'); d.style.display='block';
                    d.innerHTML = `<div class="discovery-box"><span style="font-size:2.5rem;">🌉</span><strong>The Bridge Complete!</strong><p>Computational Thinking concepts are flexible tools that can be applied in every phase of the MYP Design Cycle.</p><div style="margin-top:10px;display:flex;align-items:center;gap:8px;"><input type="checkbox" id="cbBrd"><label for="cbBrd">✅ I understand CT concepts are flexible tools.</label></div><button class="btn btn-success" id="bcBrd" disabled>➡️ Full Report</button></div>`;
                    document.getElementById('cbBrd').addEventListener('change', function() { document.getElementById('bcBrd').disabled = !this.checked; });
                    document.getElementById('bcBrd').addEventListener('click', () => goTo('completion'));
                }
            }

            // ---------- Completion ----------
            function renderCompletion() {
                sc.innerHTML = `<div class="card" style="text-align:center;border-color:var(--accent-green);"><span class="celebration">🏆</span><h2>Congratulations, Engineer ${esc(st.studentName)}!</h2><p style="font-size:1.2rem;">The MYP-1 Space Station is saved. 🛰️✨</p></div><div class="card"><h2>📖 Complete Logbook (For Toddle)</h2><h3>🧠 Computational Thinking:</h3><ul>${['Decomposition','Abstraction','Algorithm Design','Pattern Recognition'].map(c=>'<li>'+(st.discCT.includes(c)?'✅':'⬜')+' <strong>'+c+'</strong></li>').join('')}</ul><h3>📋 MYP Design Cycle:</h3><ul>${['Criterion A','Criterion B','Criterion C','Criterion D'].map(c=>'<li>'+(st.discMYP.includes(c)?'✅':'⬜')+' <strong>'+c+'</strong></li>').join('')}</ul></div><div class="card" style="text-align:center;"><h3>🚀 Go to Toddle</h3><p>Complete your <strong>Exit Ticket</strong> and check the <strong>rubric</strong>.</p></div><button class="btn btn-outline btn-sm" onclick="window.goToPhase('dash')">↩️ Dashboard</button> <button class="btn btn-primary" id="brstF">🔄 New Mission</button>`;
                document.getElementById('brstF').addEventListener('click', () => { if(confirm('Start over?')){ rst(); render('welcome'); } });
            }

            function init() {
                if (!st.studentName) render('welcome');
                else if (st.bridge) render('completion');
                else if (st.mypD) render('bridge');
                else if (st.mypC) render('mypD');
                else if (st.mypB) render('mypC');
                else if (st.mypA) render('mypB');
                else if (st.ct4) render('mypA');
                else if (st.ct3) render('ct4');
                else if (st.ct2) render('ct3');
                else if (st.ct1) render('ct2');
                else render('ct1');
            }
            init();
            console.log('🚀 MYP-1 v8 fixed and ready!');
        })();
    </script>
</body>
</html>
